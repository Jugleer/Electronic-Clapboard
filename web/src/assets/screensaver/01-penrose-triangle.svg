<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <rect width="800" height="480" fill="#ffffff"/>

  <!-- Penrose triangle: three bars that appear to form an impossible
       triangle. Drawn as filled polygons with hatching for B&W contrast.
       The illusion comes from each bar's near-end overlapping the next
       bar's far-end at every corner. -->
  <g transform="translate(400 260)" stroke="#000" stroke-width="3" stroke-linejoin="miter">

    <!-- Bottom-left bar -->
    <polygon points="-180,80 0,-80 30,-50 -120,80" fill="#ffffff"/>
    <polygon points="-180,80 -120,80 -90,110 -150,110" fill="#000000"/>
    <polygon points="-150,110 -90,110 30,-50 0,-80 -180,80" fill="none"/>

    <!-- Right bar -->
    <polygon points="180,80 0,-80 -30,-50 120,80" fill="#000000"/>
    <polygon points="180,80 120,80 150,110 210,110" fill="#ffffff"/>
    <polygon points="-150,110 210,110 150,110 -90,110" fill="#ffffff"/>

    <!-- Top bar (the impossible joiner) -->
    <polygon points="0,-80 30,-50 -30,-50" fill="#ffffff"/>

    <!-- Hatching on white faces for ink density -->
    <g stroke="#000" stroke-width="1" fill="none">
      <line x1="-150" y1="80" x2="-90" y2="20"/>
      <line x1="-130" y1="80" x2="-70" y2="20"/>
      <line x1="-110" y1="80" x2="-50" y2="20"/>
    </g>
  </g>

  <!-- Subtle tile of impossible triangles in the corners -->
  <g fill="#000000">
    <polygon points="20,20 60,20 40,55"/>
    <polygon points="780,20 740,20 760,55"/>
    <polygon points="20,460 60,460 40,425"/>
    <polygon points="780,460 740,460 760,425"/>
  </g>
</svg>
