; PlatformIO project configuration
; Electronic Clapboard — ESP32-S3-DevKitC-1 (N16R8)

[platformio]
default_envs = esp32s3
src_dir = src
include_dir = include
lib_dir = lib
test_dir = test

; ---------------------------------------------------------------------------
; Shared ESP32-S3 board / flash settings.
; The two firmware envs differ only in which `src/main*.cpp` they compile
; (and which libs they pull in), so the board config lives once.
; ---------------------------------------------------------------------------
[esp32s3_base]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- Flash / PSRAM (N16R8 = 16 MB QIO flash, 8 MB OPI PSRAM) ---
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv

; --- Native USB CDC (robust serial across brownouts / bridge-chip hiccups) ---
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=3
    -D BOARD_HAS_PSRAM

; --- Upload / monitor (COM5 on this machine; override locally if it changes) ---
upload_port = COM5
upload_speed = 921600
monitor_port = COM5
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time, default

; ---------------------------------------------------------------------------
; Default firmware: typewriter demo (Phase 3 of original build).
; This env is the SPI / e-paper regression canary and stays buildable
; until Phase 4 of the firmware refactor explicitly retires it.
; ---------------------------------------------------------------------------
[env:esp32s3]
extends = esp32s3_base
build_src_filter =
    +<*>
    -<main_net.cpp>
    -<net.cpp>
    -<status_json.cpp>
    -<log_ring.cpp>
    -<clap_log.cpp>
    -<log_server.cpp>
lib_deps =
    zinggjm/GxEPD2@^1.5.0
    adafruit/Adafruit GFX Library@^1.11.9

; ---------------------------------------------------------------------------
; Phase 1 firmware: Wi-Fi + mDNS + /status. No panel interaction.
; Builds in CI alongside `esp32s3`. Flash this env to hit `/status`; flash
; `esp32s3` to verify the panel still wakes up. C++17 for std::optional.
; ---------------------------------------------------------------------------
[env:esp32s3-net]
extends = esp32s3_base
build_src_filter =
    +<*>
    -<main.cpp>
build_unflags = -std=gnu++11
build_flags =
    ${esp32s3_base.build_flags}
    -std=gnu++17
    -D FIRMWARE_VERSION=\"0.1.0\"
lib_deps =
    mathieucarbou/ESPAsyncWebServer@^3.3.22
    mathieucarbou/AsyncTCP@^3.2.10

; ---------------------------------------------------------------------------
; Host-side env for pure-logic unit tests (state machine, JSON builder,
; voltage thresholds, etc.). Only pure-C++ src/ files are linked here —
; everything that touches Arduino.h is filtered out so the host compiler
; doesn't see hardware headers.
; ---------------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter =
    -<*>
    +<status_json.cpp>
    +<log_ring.cpp>
build_flags =
    -std=gnu++17
    -I include
    -I src
    -D UNIT_TEST
