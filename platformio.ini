; PlatformIO project configuration
; Electronic Clapboard — ESP32-S3-DevKitC-1 (N16R8)

[platformio]
default_envs = esp32s3
src_dir = src
include_dir = include
lib_dir = lib
test_dir = test

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- Flash / PSRAM (N16R8 = 16 MB QIO flash, 8 MB OPI PSRAM) ---
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio
board_build.psram_type = opi
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv

; --- Native USB CDC (robust serial across brownouts / bridge-chip hiccups) ---
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CORE_DEBUG_LEVEL=3
    -D BOARD_HAS_PSRAM

; --- Upload / monitor (COM5 on this machine; override locally if it changes) ---
upload_port = COM5
upload_speed = 921600
monitor_port = COM5
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time, default

; --- Libraries ---
lib_deps =
    zinggjm/GxEPD2@^1.5.0
    adafruit/Adafruit GFX Library@^1.11.9

[env:native]
; Host-side env for pure-logic unit tests (state machine, voltage thresholds, etc.)
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -D UNIT_TEST
